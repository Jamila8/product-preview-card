<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Frontend Mentor | Product preview card component</title>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">
        
    </head>
    <body>
        <div class="card-container">
            <img class="desktop-img" src="images/image-product-desktop.jpg" alt="profil">

            <div class="gabrielle">
            <p class="gabrielle-perfume">PERFUME</p>
            
            <h1 class="gabrielle-eau-parfume"> Gabrielle <br>Essence Eau<br> De Parfume</h1>

            <p class="gabrielle-perfume"> A floral, solar and voluptuous <br>
                 interpretation composed by <br>
                 Olivier Polge, Perfumer-Creator<br>
                 for the House of CHANEL.</p>

                 <h2 class="price"> $149.99  <span class="old-price">$169.99</span></h2>

                 <button class="addcard"> <img class="icon" src="images/shopping_cart_checkout_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" 
                  alt="sebet">Add to Cart</button> 
            </div>

        </div>
    </body>
</html>
